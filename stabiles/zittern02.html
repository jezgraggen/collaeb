<!DOCTYPE html>
<html>
  <head>
    <script src="https://aframe.io/releases/1.0.4/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  </head>
  <body style="margin: 0; overflow: hidden;">
    <a-scene embedded
      arjs="trackingMethod: best; detectionMode: mono_and_matrix; matrixCodeType: 3x3;"
      vr-mode-ui="enabled: false">

      <a-marker type="barcode" value="0"
        smooth="true" smoothCount="10" smoothTolerance="0.01" smoothThreshold="5">
        <a-image src="https://jezgraggen.github.io/collaeb/stabiles/Julia_Test.jpeg"
          scale="13 10 1" position="5 -5 -5" rotation="-90 0 0"></a-image>
      </a-marker>

      <a-marker type="barcode" value="6"
        smooth="true" smoothCount="10" smoothTolerance="0.01" smoothThreshold="5">
        <a-image src="https://jezgraggen.github.io/collaeb/stabiles/zittern/Jerome.png"
          scale="7 5 1" position="-4 0 0" rotation="-90 0 0"></a-image>
      </a-marker>

      <a-entity camera></a-entity>
    </a-scene>
  </body>
</html>
