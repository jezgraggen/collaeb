<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Neuere, stabilere Versionen -->
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

    <style>
      * { margin: 0; padding: 0; }
      body { overflow: hidden; }
    </style>
  </head>
  <body>
    <a-scene
      embedded
      arjs="trackingMethod: best;
            detectionMode: mono_and_matrix;
            matrixCodeType: 3x3;
            sourceType: webcam;
            debugUIEnabled: false;"
      renderer="antialias: true; alpha: true; precision: medium;"
      vr-mode-ui="enabled: false"
    >

      <a-assets>
        <img id="julia" src="https://jezgraggen.github.io/collaeb/stabiles/Julia_Test.jpeg" crossorigin="anonymous">
        <img id="jerome" src="https://jezgraggen.github.io/collaeb/stabiles/zittern/Jerome.png" crossorigin="anonymous">
      </a-assets>

      <a-marker type="barcode" value="0" smooth="true" smoothCount="10" smoothTolerance="0.01" smoothThreshold="5">
        <a-image src="#julia" scale="13 10 1" position="0 0 0" rotation="-90 0 0"></a-image>
      </a-marker>

      <a-marker type="barcode" value="6" smooth="true" smoothCount="10" smoothTolerance="0.01" smoothThreshold="5">
        <a-image src="#jerome" scale="7 5 1" position="0 0 0" rotation="-90 0 0"></a-image>
      </a-marker>

      <a-entity camera></a-entity>

    </a-scene>
  </body>
</html>
